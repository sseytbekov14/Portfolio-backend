spring:
  application:
    name: portfolio
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: false

server:
  port: 1414

jwt:
  secret: your_jwt_secret
  expiration: 86400000